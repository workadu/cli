name: Build Standalone Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build Binaries
        run: |
          pkg . --targets node18-linux-x64,node18-macos-x64,node18-win-x64 --out-path dist/
          mv dist/workadu-cli-linux dist/workadu-cli-linux-x64
          mv dist/workadu-cli-macos dist/workadu-cli-macos-x64
          mv dist/workadu-cli-win.exe dist/workadu-cli-win-x64.exe

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/workadu-cli-linux-x64
            dist/workadu-cli-macos-x64
            dist/workadu-cli-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
